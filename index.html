<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#000000">
  <link rel="icon" href="./assets/favicon.ico">

  <link rel="apple-touch-icon" href="./assets/icon-192.jpg">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">

  <title>RFD3344</title>

  <style>
    :root {
      --bg: #030712;
      --text: #e5e7eb;
      --heading: #dfe4ec;
    }

    body {
      margin: 0 auto;
      max-width: 1280px;
      padding: 4px;
      font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      background: var(--bg);
      font-weight: 500;
    }

    .category {
      margin-bottom: 16px;
    }

    .category-title {
      margin: 0 0 8px;
      padding-left: 4px;
      font-size: 24px;
      color: var(--heading);
    }

    .button-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .button-list a {
      padding: 8px;
      text-align: center;
      min-width: 80px;
      border-radius: 8px;
      color: var(--text);
      font-size: 18px;
      text-decoration: none;
      transition: transform 0.15s ease, filter 0.15s ease;
    }

    .button-list a:nth-child(4n + 1) {
      background: #1d4ed8;
    }

    .button-list a:nth-child(4n + 2) {
      background: #0f766e;
    }

    .button-list a:nth-child(4n + 3) {
      background: #c2410c;
    }

    .button-list a:nth-child(4n + 4) {
      background: #7c3aed;
    }

    .button-list a:hover {
      transform: translateY(-1px);
      filter: brightness(1.15);
    }
  </style>
</head>

<body>

  <div id="container"></div>
  <script src="./js/category-links.js"></script>
  <script>
    const renderCategoryList = (categoryLinks) => {
      const container = document.getElementById("container");

      categoryLinks.forEach(category => {
        const categoryDiv = document.createElement("div");
        categoryDiv.className = "category";

        const titleEl = document.createElement("div");
        titleEl.className = "category-title";
        titleEl.textContent = category.categoryTitle;
        categoryDiv.appendChild(titleEl);

        const buttonList = document.createElement("div");
        buttonList.className = "button-list";

        category.links?.forEach(item => {
          const link = document.createElement("a");
          link.href = item.url;
          link.textContent = item.text;
          // link.target = "_blank"; // Open in new tab
          buttonList.appendChild(link);
        });

        categoryDiv.appendChild(buttonList);
        container.appendChild(categoryDiv);
      });
    };

    renderCategoryList(categoryLinks);
  </script>
  <script src="./js/offline-available.js"></script>

</body>

</html>
