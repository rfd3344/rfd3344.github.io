<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#000000">
  <link rel="icon" href="./assets/favicon.ico">

  <link rel="apple-touch-icon" href="./assets/icon-192.jpg">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">

  <title>RFD3344</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      padding: 16px;
      background-color: #030712;
      color: #e5e7eb;
    }

    /* 🟦 Category spacing */
    .category {
      margin-bottom: 18px;
    }

    /* 🟩 Title (cleaner + subtle) */
    .category-title {
      font-size: 24px;
      font-weight: 600;
      padding-left: 4px;
      margin-bottom: 8px;
      color: #dfe4ec;
      letter-spacing: 0.5px;
    }

    /* 🟨 Button container */
    .button-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      /* replaces margin on buttons */
    }

    /* 🟧 Buttons */
    .button-list a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 80px;
      padding: 8px 10px;
      font-size: 18px;
      font-weight: 500;

      color: #e5e7eb;
      text-decoration: none;

      border-radius: 8px;
      background: #1f2937;

      transition: all 0.15s ease;
    }

    /* 🎨 Softer color system (instead of harsh random) */
    .button-list a:nth-child(4n+1) {
      background: #1d4ed8;
    }

    .button-list a:nth-child(4n+2) {
      background: #0f766e;
    }

    .button-list a:nth-child(4n+3) {
      background: #c2410c;
    }

    .button-list a:nth-child(4n+4) {
      background: #7c3aed;
    }


    /* ✨ Hover effect (much nicer) */
    .button-list a:hover {
      transform: translateY(-1px);
      filter: brightness(1.15);
    }

    /* 🧠 Active click feedback */
    .button-list a:active {
      transform: scale(0.96);
    }

    .version-badge {
      position: fixed;
      bottom: 8px;

      right: 10px;

      font-size: 12px;
      color: #9ca3af;
      background: rgba(31, 41, 55, 0.7);

      padding: 4px 8px;
      border-radius: 6px;

      backdrop-filter: blur(4px);
      pointer-events: none;
    }
  </style>
</head>

<body>

  <div id="container"></div>
  <script src="./js/category-links.js"></script>
  <script src="./js/app.js"></script>


  <div class="version-badge"> v2.7 </div>
</body>

</html>
